<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanishka's Security Journal</title>
  <meta name="description" content="Cybersecurity blog - Governance Risk & Compliance, Cloud security, AI Security and more." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="branding">
      <div class="title">
        <h1>Tanishka's Security Journal</h1>
        <p class="subtitle">Learning. Building. Securing. </p>
      </div>
    </div>
  </header>

  <nav class="nav-bar">
    <a href="#">home</a>
    <a href="#" class="active">blog</a>
    <a href="#">projects</a>
    <a href="#">research</a>
    <a href="https://github.com/tanishkachitnis22" target="_blank">github</a>
    <a href="https://linkedin.com/in/tanishka-chitnis/" target="_blank">linkedin</a>
  </nav>

  <nav class="tags-bar">
    <div id="tagsContainer" class="tags"></div>
  </nav>

  <main class="container">
    <section id="homeView" class="view">
      <div id="loadingIndicator" class="loading-indicator" aria-hidden="true">
        <div class="loading-spinner"></div>
        <p>Loading posts...</p>
      </div>
      <div id="postList" class="post-grid"></div>
    </section>

    <section id="postView" class="view view--hidden">
      <article class="post">
        <div class="post-meta">
          <a href="#" class="back-link">← back to all posts</a>
          <div class="meta-right">
            <time id="postDate"></time>
          </div>
        </div>
        <h1 id="postTitle" class="post-title"></h1>
        <div id="postTags" class="post-tags"></div>
        <div class="post-body">
          <aside id="toc" class="toc"></aside>
          <div id="postContent" class="content"></div>
        </div>
      </article>
    </section>
  </main>

  <button id="scrollToTop" class="scroll-to-top">↑</button>

  <footer class="site-footer">
    <div>© 2025 <strong>Tanishka K. Chitnis</strong></div>
    <div><a href="#" class="back-to-top-link">↑ back to top</a></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
